# ==============================================================================
# .github/workflows/release.yml
# ==============================================================================
# Triggered by a version tag push (e.g. v1.2.3).
#
# Pipeline
# --------
#   validate      verify the tag matches the version in pyproject.toml
#   test          full test suite — gate before building
#   build-dist    build wheel + sdist, upload as workflow artifact
#   build-binary  build standalone executable on Linux, macOS, Windows (matrix)
#   release       download all artifacts, create GitHub Release, upload assets
# ==============================================================================

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # matches v1.0.0, v2.3.14, etc.

permissions:
  contents: write                        # required to create GitHub Releases

# ==============================================================================
# JOB 1 — validate
# ==============================================================================
jobs:
  validate:
    name: Validate tag vs pyproject.toml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Extract version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Extract version from pyproject.toml
        id: toml
        run: |
          python - <<'EOF'
          import tomllib, os
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          version = data["project"]["version"]
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"version={version}\n")
          EOF

      - name: Verify versions match
        run: |
          TAG_VER="${{ steps.tag.outputs.version }}"
          TOML_VER="${{ steps.toml.outputs.version }}"
          echo "Tag version            : ${TAG_VER}"
          echo "pyproject.toml version : ${TOML_VER}"
          if [ "${TAG_VER}" != "${TOML_VER}" ]; then
            echo "::error::Tag '${TAG_VER}' does not match pyproject.toml '${TOML_VER}'"
            exit 1
          fi

  # ==============================================================================
  # JOB 2 — test
  # ==============================================================================
  test:
    name: Test suite
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

  # ==============================================================================
  # JOB 3 — build-dist  (wheel + sdist)
  # ==============================================================================
  build-dist:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install build frontend
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build --wheel --sdist --outdir dist/

      - name: List build artifacts
        run: ls -lh dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ==============================================================================
  # JOB 4 — build-binary  (PyInstaller standalone executable, 3 platforms)
  # ==============================================================================
  build-binary:
    name: Build binary (${{ matrix.platform_name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_name: linux-x86_64
            asset_name: taketaketake-linux-x86_64

          - os: macos-latest
            platform_name: macos-arm64
            asset_name: taketaketake-macos-arm64

          - os: windows-latest
            platform_name: windows-x86_64
            asset_name: taketaketake-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install package and PyInstaller
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build standalone executable
        run: >
          pyinstaller
          --onefile
          --name ${{ matrix.asset_name }}
          --collect-all taketaketake
          taketaketake/__main__.py

      - name: Smoke-test binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: ./dist/${{ matrix.asset_name }} --version

      - name: Smoke-test binary (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: dist\${{ matrix.asset_name }} --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  # ==============================================================================
  # JOB 5 — release
  # ==============================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-dist, build-binary]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts/dist/

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64
          path: artifacts/binaries/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: binary-macos-arm64
          path: artifacts/binaries/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-windows-x86_64
          path: artifacts/binaries/

      - name: List all release assets
        run: find artifacts/ -type f | sort

      - name: Extract changelog for this version
        id: changelog
        run: |
          python - <<'EOF'
          import re, os

          tag     = os.environ["GITHUB_REF_NAME"]   # e.g. "v1.0.0"
          version = tag.lstrip("v")

          with open("CHANGELOG.md") as f:
              content = f.read()

          pattern = (
              rf"## \[{re.escape(version)}\].*?\n"
              rf"(.*?)"
              rf"(?=\n## \[|\Z)"
          )
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."

          delimiter = "EOF_NOTES"
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"notes<<{delimiter}\n{notes}\n{delimiter}\n")
          EOF

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "TakeTakeTake ${{ github.ref_name }}"
          body:       ${{ steps.changelog.outputs.notes }}
          draft:      false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/dist/*.whl
            artifacts/dist/*.tar.gz
            artifacts/binaries/*
